/* ── Tooltip highlights ── */
.hl{border-bottom:1.5px dotted #2563eb;cursor:help;position:relative;display:inline;}
.hl-ko{border-bottom-color:#9333ea;}
.hl::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:6px 10px;border-radius:7px;font-size:12px;line-height:1.5;white-space:normal;max-width:220px;min-width:80px;text-align:center;z-index:200;pointer-events:none;visibility:hidden;opacity:0;transition:opacity .15s,visibility .15s;word-break:keep-all;}
.hl::before{content:'';position:absolute;bottom:calc(100% + 3px);left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1a1a1a;z-index:200;pointer-events:none;visibility:hidden;opacity:0;transition:opacity .15s,visibility .15s;}
.hl:hover::after,.hl:hover::before,.hl.tip-open::after,.hl.tip-open::before{visibility:visible;opacity:1;}

let currentDate = new Date().toISOString().slice(0,10);
let data = null;

async function loadData(date) {
  show('loadingState'); hide('contentArea'); hide('errorState');
  document.getElementById('dateDisplay').textContent = fmtDate(date);
  try {
    const url = 'https://raw.githubusercontent.com/' + CONFIG.REPO_OWNER + '/' + CONFIG.REPO_NAME + '/main/data/' + date + '.json';
    const res = await fetch(url + '?t=' + Date.now());
    if (!res.ok) throw new Error(res.status);
    data = await res.json();
    currentDate = data.date || date;
    renderAll();
    hide('loadingState'); show('contentArea');
    document.getElementById('dateDisplay').textContent = fmtDate(currentDate);
    document.getElementById('nextBtn').disabled = currentDate >= new Date().toISOString().slice(0,10);
  } catch(e) {
    hide('loadingState');
    const errEl = document.getElementById('errorState');
    errEl.textContent = fmtDate(date) + ' 데이터가 없습니다. (아직 업데이트 전이거나 설정을 확인해주세요)';
    show('errorState');
    document.getElementById('nextBtn').disabled = date >= new Date().toISOString().slice(0,10);
  }
}

function fmtDate(d) {
  const p = d.split('-');
  return p[0] + '년 ' + parseInt(p[1]) + '월 ' + parseInt(p[2]) + '일';
}

function changeDate(delta) {
  const d = new Date(currentDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  currentDate = d.toISOString().slice(0,10);
  loadData(currentDate);
}

function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('btn-' + tab).classList.add('active');
}

function renderAll() {
  renderNews('ko'); renderNews('en'); renderLearning();
}

function renderNews(lang) {
  const panel = document.getElementById('tab-' + lang);
  const dataKey = lang === 'ko' ? 'korean' : 'english';
  const newsData = data[dataKey] || {};
  const isKo = lang === 'ko';
  // Build term list: English uses vocab from learning data, Korean uses static dictionary
  const terms = isKo ? KO_TERMS : ((data.learning && data.learning.vocabulary) || []).map(v => ({
    word: v.word,
    tip: '[' + v.pos + '] ' + v.korean
  }));
  let h = '';
  for (const [key, labels] of Object.entries(CATS)) {
    const text = newsData[key];
    if (text) h += '<div class="news-card"><div class="news-cat">' + esc(labels[lang]) + '</div><p class="news-text">' + applyTooltips(text, terms, isKo) + '</p></div>';
  }
  if (data.sources && data.sources.length) {
    h += '<div class="sources"><div class="sources-label">Sources</div><div class="sources-list">';
    data.sources.forEach(s => { h += '<a href="' + esc(s.url) + '" target="_blank" rel="noopener" class="source-link">' + esc(s.title) + '</a>'; });
    h += '</div></div>';
  }
  panel.innerHTML = h;
}

function renderLearning() {
  const panel = document.getElementById('tab-learn');
  const L = data.learning || {};
  let h = '';

  if (L.vocabulary && L.vocabulary.length) {
    h += '<div class="section-label">핵심 어휘 — Key Vocabulary</div>';
    h += '<div class="section-hint">카드를 클릭하면 한국어 뜻과 예문이 나와요</div>';
    L.vocabulary.forEach(v => {
      h += '<div class="vocab-card" onclick="this.classList.toggle(\'open\')">';
      h += '<div class="vocab-front"><div><span class="vocab-word">' + esc(v.word) + '</span><span class="vocab-badge">' + esc(v.pos) + '</span></div><span class="vocab-arrow">▾</span></div>';
      h += '<div class="vocab-back"><div class="vocab-ko">뜻: <strong>' + esc(v.korean) + '</strong></div><div class="vocab-example">' + esc(v.example) + '</div></div>';
      h += '</div>';
    });
  }

  if (L.sentences && L.sentences.length) {
    h += '<div class="section-label" style="margin-top:22px;">문장 구조 분석 — Sentence Structure</div>';
    h += '<div class="section-hint">클릭하면 구조 설명이 펼쳐져요</div>';
    L.sentences.forEach(s => {
      h += '<div class="sent-card" onclick="this.classList.toggle(\'open\')">';
      h += '<div class="sent-front"><p class="sent-text">"' + esc(s.sentence) + '"</p><span class="sent-arrow">▾</span></div>';
      h += '<div class="sent-detail"><div><b>구조:</b> ' + esc(s.structure) + '</div><div style="margin-top:5px;"><b>포인트:</b> ' + esc(s.point) + '</div>';
      if (s.similar) h += '<div class="sent-similar">유사 문장: "' + esc(s.similar) + '"</div>';
      h += '</div></div>';
    });
  }

  if (L.expressions && L.expressions.length) {
    h += '<div class="section-label" style="margin-top:22px;">뉴스 단골 표현 — News Expressions</div>';
    L.expressions.forEach((e, i) => {
      h += '<div class="expr-card">';
      h += '<div class="expr-phrase">' + esc(e.expr) + '</div>';
      h += '<div class="expr-meaning">' + esc(e.meaning) + ' — ' + esc(e.usage) + '</div>';
      h += '<button class="expr-reveal" onclick="toggleEx(this)">예문 보기 ▾</button>';
      h += '<div class="expr-example">' + esc(e.example) + '</div>';
      h += '</div>';
    });
  }

  if (L.challenge) {
    const ch = L.challenge;
    h += '<div class="section-label" style="margin-top:22px;">영작 챌린지 — Writing Challenge</div>';
    h += '<div class="challenge-card">';
    h += '<div class="challenge-q">아래 문장을 영어로 작성해보세요</div>';
    h += '<div class="challenge-ko">' + esc(ch.korean) + '</div>';
    h += '<textarea class="challenge-input" id="challengeInput" placeholder="여기에 영어로 작성하세요..."></textarea>';
    h += '<div class="submit-row">';
    h += '<button class="submit-btn" id="submitBtn" onclick="submitAnswer()">Claude에게 피드백 받기 ↗</button>';
    h += '<button class="ans-reveal-btn" onclick="toggleAnswer(this)">모범 답안 보기 ▾</button>';
    h += '<span class="loading-msg" id="loadingMsg">Claude가 검토 중...</span>';
    h += '</div>';
    h += '<div class="answer-box" id="answerBox"><div class="answer-sentence">' + esc(ch.answer) + '</div><div class="answer-explain">' + esc(ch.explanation) + '</div></div>';
    h += '<div class="fb-box" id="fbBox"></div>';
    h += '</div>';
  }

  panel.innerHTML = h;
}

function toggleEx(btn) {
  const box = btn.nextElementSibling;
  box.classList.toggle('show');
  btn.textContent = box.classList.contains('show') ? '예문 닫기 ▴' : '예문 보기 ▾';
}

function toggleAnswer(btn) {
  const box = document.getElementById('answerBox');
  box.classList.toggle('show');
  btn.textContent = box.classList.contains('show') ? '모범 답안 닫기 ▴' : '모범 답안 보기 ▾';
}

async function submitAnswer() {
  const input = document.getElementById('challengeInput');
  const submitBtn = document.getElementById('submitBtn');
  const loadingMsg = document.getElementById('loadingMsg');
  const fbBox = document.getElementById('fbBox');
  const userAnswer = input.value.trim();

  if (!userAnswer) {
    input.style.borderColor = '#ef4444';
    input.focus();
    setTimeout(() => { input.style.borderColor = ''; }, 2000);
    return;
  }

  submitBtn.disabled = true;
  loadingMsg.style.display = 'inline';
  fbBox.className = 'fb-box';

  try {
    const ch = data.learning.challenge;
    const res = await fetch(CONFIG.FEEDBACK_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: ch.korean, userAnswer, answer: ch.answer, explanation: ch.explanation })
    });
    if (!res.ok) throw new Error('Network error');
    const fb = await res.json();
    renderFeedback(fbBox, fb, userAnswer);
  } catch(e) {
    fbBox.className = 'fb-box show wrong';
    fbBox.innerHTML = '<div class="fb-head"><div class="fb-verdict">피드백을 불러오지 못했습니다</div></div><div class="fb-sec"><div class="fb-sec-text">잠시 후 다시 시도해주세요.</div></div>';
  } finally {
    submitBtn.disabled = false;
    loadingMsg.style.display = 'none';
  }
}

function renderFeedback(box, fb, userAnswer) {
  const ok = fb.correct !== false;
  const score = Math.round(fb.score || 0);
  box.className = 'fb-box show ' + (ok ? 'correct' : 'wrong');
  let h = '<div class="fb-head"><div class="fb-score">' + score + '점</div><div class="fb-verdict">' + (ok ? '잘 했어요!' : '조금 더 다듬어봐요') + '</div></div>';
  if (fb.strengths)    h += '<div class="fb-sec"><div class="fb-sec-title">잘한 점</div><div class="fb-sec-text">' + esc(fb.strengths) + '</div></div>';
  if (fb.improvements) h += '<div class="fb-sec"><div class="fb-sec-title">개선점</div><div class="fb-sec-text">' + esc(fb.improvements) + '</div></div>';
  if (fb.betterVersion && fb.betterVersion.trim() !== userAnswer) h += '<div class="fb-sec"><div class="fb-sec-title">더 나은 표현</div><div class="fb-sec-text fb-better">' + esc(fb.betterVersion) + '</div></div>';
  if (fb.explanation)  h += '<div class="fb-sec"><div class="fb-sec-title">문법 포인트</div><div class="fb-sec-text">' + esc(fb.explanation) + '</div></div>';
  box.innerHTML = h;
  box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Wrap matched vocabulary / terms with dotted-underline tooltip spans
function applyTooltips(text, terms, isKo) {
  if (!terms || !terms.length) return esc(text);
  // Sort longest first so "총파업" matches before "파업"
  const sorted = [...terms].sort((a, b) => b.word.length - a.word.length);
  const escapedPats = sorted.map(t => t.word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  // Korean: no word boundaries (Unicode); English: \b boundaries, case-insensitive
  const flags = isKo ? 'g' : 'gi';
  const pat = isKo
    ? '(' + escapedPats.join('|') + ')'
    : '\\b(' + escapedPats.join('|') + ')\\b';
  const regex = new RegExp(pat, flags);
  // Build lookup map
  const lookup = {};
  sorted.forEach(t => { lookup[isKo ? t.word : t.word.toLowerCase()] = t; });
  const cls = isKo ? 'hl hl-ko' : 'hl';
  let result = '';
  let last = 0;
  let m;
  regex.lastIndex = 0;
  while ((m = regex.exec(text)) !== null) {
    result += esc(text.slice(last, m.index));
    const matched = m[0];
    const key = isKo ? matched : matched.toLowerCase();
    const term = lookup[key];
    const tip = term ? escAttr(term.tip) : '';
    result += '<span class="' + cls + '" data-tip="' + tip + '" onclick="this.classList.toggle(\'tip-open\')">' + esc(matched) + '</span>';
    last = m.index + matched.length;
  }
  result += esc(text.slice(last));
  return result;
}

function show(id) { document.getElementById(id).style.display = 'block'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

loadData(currentDate);
