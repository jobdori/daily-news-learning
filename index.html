<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily News & English Learning</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f9f9f7;color:#1a1a1a;line-height:1.6;}
.container{max-width:760px;margin:0 auto;padding:0 20px;}
.header{background:#fff;border-bottom:1px solid #e8e8e4;padding:14px 0;}
.header-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.site-title{font-size:17px;font-weight:600;}
.date-nav{display:flex;align-items:center;gap:8px;}
.date-btn{background:none;border:1px solid #e8e8e4;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:13px;color:#666;}
.date-btn:hover{background:#f5f5f0;}
.date-btn:disabled{opacity:.35;cursor:not-allowed;}
.current-date{font-size:13px;font-weight:500;min-width:120px;text-align:center;}
.tabs{background:#fff;border-bottom:1px solid #e8e8e4;position:sticky;top:0;z-index:10;}
.tab-list{display:flex;max-width:760px;margin:0 auto;padding:0 20px;}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;padding:13px 16px;font-size:14px;cursor:pointer;color:#888;font-weight:400;font-family:inherit;margin-bottom:-1px;}
.tab-btn.active{color:#1a1a1a;font-weight:500;border-bottom-color:#1a1a1a;}
.tab-btn:hover{color:#1a1a1a;}
main{padding:24px 0 60px;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.news-card{background:#fff;border:1px solid #e8e8e4;border-radius:12px;padding:16px 20px;margin-bottom:10px;}
.news-cat{font-size:11px;font-weight:600;letter-spacing:.07em;color:#888;text-transform:uppercase;margin-bottom:8px;}
.news-text{font-size:15px;line-height:1.78;color:#1a1a1a;}
.section-label{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.09em;margin:24px 0 4px;}
.section-hint{font-size:12px;color:#bbb;margin-bottom:10px;}
.vocab-card{background:#fff;border:1px solid #e8e8e4;border-radius:12px;padding:13px 18px;margin-bottom:8px;cursor:pointer;}
.vocab-front{display:flex;justify-content:space-between;align-items:center;}
.vocab-word{font-size:15px;font-weight:500;}
.vocab-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:#e8f0fe;color:#1d4ed8;margin-left:8px;vertical-align:middle;}
.vocab-arrow{color:#ccc;font-size:13px;transition:transform .2s;}
.vocab-card.open .vocab-arrow{transform:rotate(180deg);}
.vocab-back{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #f0f0ec;}
.vocab-card.open .vocab-back{display:block;}
.vocab-ko{font-size:13px;color:#555;margin-bottom:7px;}
.vocab-ko strong{background:#f0fdf4;color:#15803d;padding:1px 6px;border-radius:4px;font-weight:600;}
.vocab-example{font-size:13px;font-style:italic;color:#444;background:#f9f9f7;border-radius:8px;padding:8px 12px;}
.sent-card{background:#fff;border:1px solid #e8e8e4;border-radius:12px;padding:13px 18px;margin-bottom:8px;cursor:pointer;}
.sent-front{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.sent-text{font-size:13px;font-style:italic;line-height:1.65;flex:1;}
.sent-arrow{color:#ccc;font-size:13px;transition:transform .2s;flex-shrink:0;padding-top:2px;}
.sent-card.open .sent-arrow{transform:rotate(180deg);}
.sent-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #f0f0ec;font-size:13px;line-height:1.7;color:#333;}
.sent-card.open .sent-detail{display:block;}
.sent-detail b{color:#1a1a1a;}
.sent-similar{font-size:12px;font-style:italic;color:#666;background:#f9f9f7;border-radius:8px;padding:8px 12px;margin-top:8px;}
.expr-card{background:#fff;border:1px solid #e8e8e4;border-radius:12px;padding:13px 18px;margin-bottom:8px;}
.expr-phrase{font-size:14px;font-weight:600;font-family:'Menlo','Consolas',monospace;background:#f5f5f0;display:inline-block;padding:2px 8px;border-radius:5px;margin-bottom:5px;}
.expr-meaning{font-size:13px;color:#555;margin-bottom:7px;}
.expr-reveal{background:#f5f5f0;border:1px solid #e8e8e4;border-radius:6px;padding:4px 11px;font-size:12px;cursor:pointer;color:#666;font-family:inherit;}
.expr-reveal:hover{background:#eee;}
.expr-example{display:none;font-size:13px;font-style:italic;color:#444;background:#f9f9f7;border-radius:8px;padding:8px 12px;margin-top:8px;}
.expr-example.show{display:block;}
.challenge-card{background:#fff;border:1px solid #e8e8e4;border-radius:12px;padding:20px;margin-bottom:8px;}
.challenge-q{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.challenge-ko{font-size:16px;color:#1a1a1a;margin-bottom:16px;line-height:1.6;}
.challenge-input{width:100%;padding:12px 14px;border:1.5px solid #e8e8e4;border-radius:8px;font-size:14px;resize:vertical;min-height:76px;font-family:inherit;color:#1a1a1a;outline:none;background:#fff;}
.challenge-input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.submit-row{display:flex;gap:10px;align-items:center;margin-top:12px;flex-wrap:wrap;}
.submit-btn{background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}
.submit-btn:hover{background:#333;}
.submit-btn:disabled{background:#ccc;cursor:not-allowed;}
.ans-reveal-btn{background:none;border:1px solid #e8e8e4;border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer;color:#666;font-family:inherit;}
.ans-reveal-btn:hover{background:#f5f5f0;}
.loading-msg{font-size:12px;color:#aaa;display:none;}
.answer-box{display:none;background:#f9f9f7;border:1px solid #e8e8e4;border-radius:8px;padding:12px 16px;margin-top:12px;}
.answer-box.show{display:block;}
.answer-sentence{font-size:14px;font-style:italic;font-weight:600;color:#1a1a1a;margin-bottom:7px;}
.answer-explain{font-size:13px;color:#555;line-height:1.65;}
.fb-box{display:none;border-radius:12px;padding:16px 20px;margin-top:14px;}
.fb-box.show{display:block;}
.fb-box.correct{background:#f0fdf4;border:1px solid #bbf7d0;}
.fb-box.wrong{background:#fff7ed;border:1px solid #fed7aa;}
.fb-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.fb-score{font-size:22px;font-weight:700;}
.fb-box.correct .fb-score{color:#15803d;}
.fb-box.wrong .fb-score{color:#d97706;}
.fb-verdict{font-size:14px;font-weight:600;}
.fb-sec{margin-bottom:10px;}
.fb-sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:3px;}
.fb-sec-text{font-size:13px;color:#333;line-height:1.6;}
.fb-better{font-style:italic;font-weight:500;color:#1d4ed8;}
.sources{margin-top:28px;padding-top:14px;border-top:1px solid #e8e8e4;}
.sources-label{font-size:11px;font-weight:700;color:#bbb;letter-spacing:.07em;text-transform:uppercase;margin-bottom:7px;}
.sources-list{display:flex;flex-wrap:wrap;gap:10px;}
.source-link{font-size:12px;color:#2563eb;text-decoration:none;}
.source-link:hover{text-decoration:underline;}
.state-msg{text-align:center;padding:60px 20px;color:#aaa;font-size:15px;}
@media(max-width:540px){.tab-btn{padding:12px 12px;font-size:13px;}.news-text{font-size:14px;}}
</style>
</head>
<body>

<header class="header">
  <div class="container header-inner">
    <div class="site-title">Daily News &amp; English</div>
    <div class="date-nav">
      <button class="date-btn" onclick="changeDate(-1)" title="이전 날">&#8592;</button>
      <span class="current-date" id="dateDisplay">불러오는 중...</span>
      <button class="date-btn" id="nextBtn" onclick="changeDate(1)" title="다음 날">&#8594;</button>
    </div>
  </div>
</header>

<nav class="tabs">
  <div class="tab-list">
    <button class="tab-btn active" id="btn-ko" onclick="switchTab('ko')">🇰🇷 한국어</button>
    <button class="tab-btn" id="btn-en" onclick="switchTab('en')">🌐 English</button>
    <button class="tab-btn" id="btn-learn" onclick="switchTab('learn')">📚 학습</button>
  </div>
</nav>

<main>
  <div class="container">
    <div id="loadingState" class="state-msg">뉴스 데이터를 불러오는 중...</div>
    <div id="contentArea" style="display:none;">
      <div class="tab-panel active" id="tab-ko"></div>
      <div class="tab-panel" id="tab-en"></div>
      <div class="tab-panel" id="tab-learn"></div>
    </div>
    <div id="errorState" class="state-msg" style="display:none;"></div>
  </div>
</main>

<script>
// =========================================
// CONFIG — 아래 두 값을 설정하세요
// =========================================
const CONFIG = {
  REPO_OWNER: 'YOUR_GITHUB_USERNAME',    // 예: 'parkcow'
  REPO_NAME:  'daily-news-learning',     // 저장소 이름
  FEEDBACK_WEBHOOK: 'https://parkathy.app.n8n.cloud/webhook/news-feedback'
};
// =========================================

const CATS = {
  politics:      { ko:'🇰🇷 정치',      en:'🇰🇷 Politics' },
  economy:       { ko:'💰 경제',        en:'💰 Economy' },
  society:       { ko:'🏙 사회',        en:'🏙 Society' },
  international: { ko:'🌍 국제',        en:'🌍 International' },
  tech:          { ko:'💡 기술·과학',   en:'💡 Tech & Science' }
};

let currentDate = new Date().toISOString().slice(0,10);
let data = null;

async function loadData(date) {
  show('loadingState'); hide('contentArea'); hide('errorState');
  document.getElementById('dateDisplay').textContent = fmtDate(date);
  try {
    const url = 'https://raw.githubusercontent.com/' + CONFIG.REPO_OWNER + '/' + CONFIG.REPO_NAME + '/main/data/' + date + '.json';
    const res = await fetch(url + '?t=' + Date.now());
    if (!res.ok) throw new Error(res.status);
    data = await res.json();
    currentDate = data.date || date;
    renderAll();
    hide('loadingState'); show('contentArea');
    document.getElementById('dateDisplay').textContent = fmtDate(currentDate);
    document.getElementById('nextBtn').disabled = currentDate >= new Date().toISOString().slice(0,10);
  } catch(e) {
    hide('loadingState');
    const errEl = document.getElementById('errorState');
    errEl.textContent = fmtDate(date) + ' 데이터가 없습니다. (아직 업데이트 전이거나 설정을 확인해주세요)';
    show('errorState');
  }
}

function fmtDate(d) {
  const p = d.split('-');
  return p[0] + '년 ' + parseInt(p[1]) + '월 ' + parseInt(p[2]) + '일';
}

function changeDate(delta) {
  const d = new Date(currentDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  currentDate = d.toISOString().slice(0,10);
  loadData(currentDate);
}

function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('btn-' + tab).classList.add('active');
}

function renderAll() {
  renderNews('ko'); renderNews('en'); renderLearning();
}

function renderNews(lang) {
  const panel = document.getElementById('tab-' + lang);
  const newsData = data[lang] || {};
  let h = '';
  for (const [key, labels] of Object.entries(CATS)) {
    const text = newsData[key];
    if (text) h += '<div class="news-card"><div class="news-cat">' + esc(labels[lang]) + '</div><p class="news-text">' + esc(text) + '</p></div>';
  }
  if (data.sources && data.sources.length) {
    h += '<div class="sources"><div class="sources-label">Sources</div><div class="sources-list">';
    data.sources.forEach(s => { h += '<a href="' + esc(s.url) + '" target="_blank" rel="noopener" class="source-link">' + esc(s.title) + '</a>'; });
    h += '</div></div>';
  }
  panel.innerHTML = h;
}

function renderLearning() {
  const panel = document.getElementById('tab-learn');
  const L = data.learning || {};
  let h = '';

  if (L.vocabulary && L.vocabulary.length) {
    h += '<div class="section-label">핵심 어휘 — Key Vocabulary</div>';
    h += '<div class="section-hint">카드를 클릭하면 한국어 뜻과 예문이 나와요</div>';
    L.vocabulary.forEach(v => {
      h += '<div class="vocab-card" onclick="this.classList.toggle(\'open\')">';
      h += '<div class="vocab-front"><div><span class="vocab-word">' + esc(v.word) + '</span><span class="vocab-badge">' + esc(v.pos) + '</span></div><span class="vocab-arrow">▾</span></div>';
      h += '<div class="vocab-back"><div class="vocab-ko">뜻: <strong>' + esc(v.korean) + '</strong></div><div class="vocab-example">' + esc(v.example) + '</div></div>';
      h += '</div>';
    });
  }

  if (L.sentences && L.sentences.length) {
    h += '<div class="section-label" style="margin-top:22px;">문장 구조 분석 — Sentence Structure</div>';
    h += '<div class="section-hint">클릭하면 구조 설명이 펼쳐져요</div>';
    L.sentences.forEach(s => {
      h += '<div class="sent-card" onclick="this.classList.toggle(\'open\')">';
      h += '<div class="sent-front"><p class="sent-text">"' + esc(s.sentence) + '"</p><span class="sent-arrow">▾</span></div>';
      h += '<div class="sent-detail"><div><b>구조:</b> ' + esc(s.structure) + '</div><div style="margin-top:5px;"><b>포인트:</b> ' + esc(s.point) + '</div>';
      if (s.similar) h += '<div class="sent-similar">유사 문장: "' + esc(s.similar) + '"</div>';
      h += '</div></div>';
    });
  }

  if (L.expressions && L.expressions.length) {
    h += '<div class="section-label" style="margin-top:22px;">뉴스 단골 표현 — News Expressions</div>';
    L.expressions.forEach((e, i) => {
      h += '<div class="expr-card">';
      h += '<div class="expr-phrase">' + esc(e.expr) + '</div>';
      h += '<div class="expr-meaning">' + esc(e.meaning) + ' — ' + esc(e.usage) + '</div>';
      h += '<button class="expr-reveal" onclick="toggleEx(this)">예문 보기 ▾</button>';
      h += '<div class="expr-example">' + esc(e.example) + '</div>';
      h += '</div>';
    });
  }

  if (L.challenge) {
    const ch = L.challenge;
    h += '<div class="section-label" style="margin-top:22px;">영작 챌린지 — Writing Challenge</div>';
    h += '<div class="challenge-card">';
    h += '<div class="challenge-q">아래 문장을 영어로 작성해보세요</div>';
    h += '<div class="challenge-ko">' + esc(ch.korean) + '</div>';
    h += '<textarea class="challenge-input" id="challengeInput" placeholder="여기에 영어로 작성하세요..."></textarea>';
    h += '<div class="submit-row">';
    h += '<button class="submit-btn" id="submitBtn" onclick="submitAnswer()">Claude에게 피드백 받기 ↗</button>';
    h += '<button class="ans-reveal-btn" onclick="toggleAnswer(this)">모범 답안 보기 ▾</button>';
    h += '<span class="loading-msg" id="loadingMsg">Claude가 검토 중...</span>';
    h += '</div>';
    h += '<div class="answer-box" id="answerBox"><div class="answer-sentence">' + esc(ch.answer) + '</div><div class="answer-explain">' + esc(ch.explanation) + '</div></div>';
    h += '<div class="fb-box" id="fbBox"></div>';
    h += '</div>';
  }

  panel.innerHTML = h;
}

function toggleEx(btn) {
  const box = btn.nextElementSibling;
  box.classList.toggle('show');
  btn.textContent = box.classList.contains('show') ? '예문 닫기 ▴' : '예문 보기 ▾';
}

function toggleAnswer(btn) {
  const box = document.getElementById('answerBox');
  box.classList.toggle('show');
  btn.textContent = box.classList.contains('show') ? '모범 답안 닫기 ▴' : '모범 답안 보기 ▾';
}

async function submitAnswer() {
  const input = document.getElementById('challengeInput');
  const submitBtn = document.getElementById('submitBtn');
  const loadingMsg = document.getElementById('loadingMsg');
  const fbBox = document.getElementById('fbBox');
  const userAnswer = input.value.trim();

  if (!userAnswer) {
    input.style.borderColor = '#ef4444';
    input.focus();
    setTimeout(() => { input.style.borderColor = ''; }, 2000);
    return;
  }

  submitBtn.disabled = true;
  loadingMsg.style.display = 'inline';
  fbBox.className = 'fb-box';

  try {
    const ch = data.learning.challenge;
    const res = await fetch(CONFIG.FEEDBACK_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: ch.korean, userAnswer, answer: ch.answer, explanation: ch.explanation })
    });
    if (!res.ok) throw new Error('Network error');
    const fb = await res.json();
    renderFeedback(fbBox, fb, userAnswer);
  } catch(e) {
    fbBox.className = 'fb-box show wrong';
    fbBox.innerHTML = '<div class="fb-head"><div class="fb-verdict">피드백을 불러오지 못했습니다</div></div><div class="fb-sec"><div class="fb-sec-text">잠시 후 다시 시도해주세요.</div></div>';
  } finally {
    submitBtn.disabled = false;
    loadingMsg.style.display = 'none';
  }
}

function renderFeedback(box, fb, userAnswer) {
  const ok = fb.correct !== false;
  const score = Math.round(fb.score || 0);
  box.className = 'fb-box show ' + (ok ? 'correct' : 'wrong');
  let h = '<div class="fb-head"><div class="fb-score">' + score + '점</div><div class="fb-verdict">' + (ok ? '잘 했어요!' : '조금 더 다듬어봐요') + '</div></div>';
  if (fb.strengths)    h += '<div class="fb-sec"><div class="fb-sec-title">잘한 점</div><div class="fb-sec-text">' + esc(fb.strengths) + '</div></div>';
  if (fb.improvements) h += '<div class="fb-sec"><div class="fb-sec-title">개선점</div><div class="fb-sec-text">' + esc(fb.improvements) + '</div></div>';
  if (fb.betterVersion && fb.betterVersion.trim() !== userAnswer) h += '<div class="fb-sec"><div class="fb-sec-title">더 나은 표현</div><div class="fb-sec-text fb-better">' + esc(fb.betterVersion) + '</div></div>';
  if (fb.explanation)  h += '<div class="fb-sec"><div class="fb-sec-title">문법 포인트</div><div class="fb-sec-text">' + esc(fb.explanation) + '</div></div>';
  box.innerHTML = h;
  box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function show(id) { document.getElementById(id).style.display = 'block'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

loadData(currentDate);
</script>
</body>
</html>
